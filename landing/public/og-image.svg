      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Brand mark, big -->
  <g transform="translate(96 96)">
    <rect width="120" height="120" rx="28" fill="#0a0c10" stroke="#1f2937" stroke-width="2"/>
    <path d="M30 26 L80 26 L92 42 L92 96 L30 96 Z" fill="none" stroke="#6ee7b7" stroke-width="6" stroke-linejoin="round"/>
    <path d="M48 56 L74 56 M48 72 L66 72" stroke="#6ee7b7" stroke-width="6" stroke-linecap="round"/>
    <circle cx="86" cy="36" r="9" fill="#6ee7b7"/>
  </g>

  <text x="240" y="148" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="700" fill="#f9fafb">Codetrail</text>
  <text x="240" y="194" font-family="-apple-system, system-ui, sans-serif" font-size="26" fill="#6ee7b7">⌁ Persistent memory for AI coding sessions</text>

  <!-- Headline -->
